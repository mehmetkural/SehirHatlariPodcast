<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Şehir Hatları Podcast — İstanbul Boğaz Yolculukları</title>
  <meta name="description" content="İstanbul Şehir Hatları vapurlarıyla seyahat ederken rotanızdaki tarihi eserleri keşfedin." />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Fixed Header -->
  <header class="site-header">
    <div class="site-header-inner">
      <div class="site-logo">
        <span class="site-logo-emoji">⚓</span>
        <span class="site-logo-text font-headline">Şehir Hatları Podcast</span>
      </div>
      <span class="material-symbols-outlined site-header-icon">near_me</span>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero wave-shape">
    <div class="hero-gradient"></div>
    <div class="hero-wave">
      <svg viewBox="0 0 1440 80" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,40 C240,80 480,0 720,40 C960,80 1200,0 1440,40 L1440,80 L0,80 Z" fill="#ffffff"/>
      </svg>
    </div>
    <div class="hero-content">
      <div class="hero-badge">⚓</div>
      <h1 class="hero-title font-headline">Şehir Hatları Podcast</h1>
      <p class="hero-subtitle">Vapurun ritmiyle İstanbul'un hikayelerine kulak verin.</p>
    </div>
  </section>

  <!-- Route Cards -->
  <main class="routes-section">
    <p class="section-label">Tüm Hatlar</p>
    <div class="routes-grid" id="routes-grid"></div>
    <div class="card-soon">
      <span class="material-symbols-outlined">more_horiz</span>
      <p>Yakında Yeni Rotalar</p>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="home-nav">
    <div class="home-nav-item active">
      <span class="material-symbols-outlined icon-fill">podcasts</span>
      Hatlar
    </div>
    <a class="home-nav-item" href="#">
      <span class="material-symbols-outlined">directions_boat</span>
      Duraklar
    </a>
    <a class="home-nav-item" href="#">
      <span class="material-symbols-outlined">map</span>
      Harita
    </a>
  </nav>

  <!-- FAB -->
  <button class="fab" onclick="location.href='player.html?route=bogaz'">
    <span class="material-symbols-outlined">play_arrow</span>
  </button>

  <script src="js/routes.js"></script>
  <script>
    const grid = document.getElementById('routes-grid');

    ROUTES.forEach(route => {
      const card = document.createElement('a');
      card.href = 'player.html?route=' + route.id;
      card.className = 'route-card';
      card.style.borderTop = '6px solid ' + route.color;

      card.innerHTML = `
        <div class="route-card-body">
          <div class="route-card-emoji">${route.emoji}</div>
          <h3 class="route-card-name font-headline">${route.name}</h3>
          <p class="route-card-subtitle">${route.subtitle}</p>
          <p class="route-card-desc">${route.description}</p>
          <div class="route-card-meta">
            <span class="meta-badge">
              <span class="material-symbols-outlined">schedule</span>
              ~${route.duration} dk
            </span>
            <span class="meta-badge">
              <span class="material-symbols-outlined">location_on</span>
              ${route.stops.length} durak
            </span>
          </div>
          <span class="route-card-cta font-headline" style="color:${route.color}">
            Yolculuğa Başla →
          </span>
        </div>
      `;

      grid.appendChild(card);
    });
  </script>

</body>
</html>
